name: Create Release Tag

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

jobs:
  create-tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from branch
        id: version
        run: |
          # Extract version from release/X.X.X branch name
          VERSION=${GITHUB_HEAD_REF#release/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create and push tag
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release version ${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.version }}';
            
            // Try to read CHANGELOG for release notes
            let releaseNotes = '';
            if (fs.existsSync('CHANGELOG.md')) {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              // Extract version section from changelog
              const versionRegex = new RegExp(`## \\[?${version.replace(/\./g, '\\.')}\\]?[\\s\\S]*?(?=## |$)`, 'i');
              const match = changelog.match(versionRegex);
              releaseNotes = match ? match[0] : `Release ${version}`;
            } else {
              releaseNotes = `Release ${version}`;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `Release ${version}`,
              body: releaseNotes,
              draft: false,
              prerelease: false
            });
