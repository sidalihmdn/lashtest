name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    steps:

      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate CHANGELOG with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md

      - name: Update version files
        run: |
          sed -i 's/__version__ = "[^"]*"/__version__ = "${{ inputs.version }}"/' src/lashtest/__version__.py
          sed -i 's/^version = "[^"]*"/version = "${{ inputs.version }}"/' pyproject.toml

      - name: Commit changes
        run: |
          git fetch origin
          git checkout -b release/${{ inputs.version }} origin/develop
          
          git add .
          git commit -m "chore: release ${{ inputs.version }}"
          git push origin release/${{ inputs.version }}

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_KEY }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${{ inputs.version }}`,
              head: `release/${{ inputs.version }}`,
              base: 'master',
              body: `Release branch for version ${{ inputs.version }}\n\nThis PR merges release/${{ inputs.version }} into master.`
            });
            console.log(`Created PR #${pr.number}`);
