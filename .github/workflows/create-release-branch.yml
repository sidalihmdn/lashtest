name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release branch
        run: |
          git fetch origin
          git checkout develop
          git pull origin develop
          git checkout -b release/${{ inputs.version }}
          git push origin release/${{ inputs.version }}

      - name: Update version files
        run: |
          # Update __version__.py
          if [ -f src/lashtest/__version__.py ]; then
            sed -i 's/__version__ = "[^"]*"/__version__ = "${{ inputs.version }}"/' src/lashtest/__version__.py
          fi
          
          # Update pyproject.toml
          if [ -f pyproject.toml ]; then
            sed -i 's/^version = "[^"]*"/version = "${{ inputs.version }}"/' pyproject.toml
          fi
          
          # Update setup.cfg if it exists
          if [ -f setup.cfg ]; then
            sed -i 's/^version = .*/version = ${{ inputs.version }}/' setup.cfg
          fi

      - name: Generate CHANGELOG with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ inputs.version }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit version and changelog updates
        run: |
          git add src/lashtest/__version__.py pyproject.toml setup.cfg CHANGELOG.md 2>/dev/null || true
          git commit -m "chore: bump version to ${{ inputs.version }}" || true
          git push origin release/${{ inputs.version }}

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_KEY }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${{ inputs.version }}`,
              head: `release/${{ inputs.version }}`,
              base: 'master',
              body: `Release branch for version ${{ inputs.version }}\n\nThis PR merges release/${{ inputs.version }} into master.`
            });
            console.log(`Created PR #${pr.number}`);
